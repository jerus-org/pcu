version: 2.1

parameters:
  min_rust_version:
    type: string
    default: "1.88"
orbs:
  # cci-ignore-next-line
  toolkit: jerus-org/circleci-toolkit@6.0.0

# Custom executors removed - using toolkit rolling executors instead:
#   - toolkit/rust_env_rolling for Rust jobs
#   - toolkit/base_env for base jobs

jobs:
  # ── CACHE EXPERIMENT JOBS ────────────────────────────────────────────────────
  # These jobs mirror the existing toolkit/required_builds, toolkit/idiomatic_rust,
  # toolkit/test_doc_build, and toolkit/optional_builds jobs but implement the
  # caching changes proposed in:
  #   digital-prstv/circleci-toolkit#437 — shared build cache + compiler version
  #   digital-prstv/circleci-toolkit#438 — optional_builds cache split + non-blocking
  #
  # All four run in parallel with their toolkit counterparts so the CircleCI
  # timing UI gives a direct before/after comparison in the same pipeline run.
  #
  # Cache key namespacing:
  #   build-exp-v1-  shared stable build cache (#437 shared stable jobs)
  #   build-exp-doc-v1-  nightly doc build cache (#437 doc job)
  #   optional-rustup-v1-  rustup-only cache for nightly/beta (#438)
  # These are intentionally distinct from the production build-v1- / clippy-v1- /
  # doc-v1- / optional-v1- keys so the experiment does not pollute production caches.

  # ── EXP #437: required_builds equivalent ────────────────────────────────────
  # Changes vs toolkit/required_builds:
  #   1. Writes rust-toolchain-version.txt so the cache key includes the compiler
  #   2. Restores from build-exp-v1- seeded by exp-idiomatic-rust (which runs first)
  #      → stable build reuses clippy artifacts; only the MSRV build compiles fresh
  #   3. skip_msrv parameter (default false — gate open) lets the experiment
  #      delegate the MSRV build to exp-msrv-build running in parallel.
  #   4. MSRV always uses --target-dir /tmp/target-msrv so stable and MSRV
  #      artifacts never share target/; same path as exp-msrv-build so caches
  #      are interchangeable between the two code paths.
  exp-required-builds:
    executor:
      name: toolkit/rust_env_rolling
    parameters:
      skip_msrv:
        type: boolean
        default: false
        description: >
          When true the MSRV build is skipped here and must be run by a
          separate parallel job (exp-msrv-build). Default false keeps
          the historical behaviour of building both stable and MSRV.
    steps:
      - checkout
      - run:
          name: Write compiler version for cache key
          command: rustc --version > rust-toolchain-version.txt && cat rust-toolchain-version.txt
      - restore_cache:
          name: Restore dependency cache
          keys:
            - deps-v1-{{ arch }}-{{ checksum "Cargo.lock" }}
            - deps-v1-{{ arch }}-
      - restore_cache:
          name: Restore shared build cache (exp #437)
          keys:
            - build-exp-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-{{ checksum "Cargo.lock" }}
            - build-exp-v1-{{ arch }}-
      - run:
          name: Build stable
          command: cargo build --all-features
      - save_cache:
          name: Save dependency cache
          key: deps-v1-{{ arch }}-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
      - save_cache:
          name: Save shared build cache (exp #437)
          key: build-exp-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-{{ checksum "Cargo.lock" }}
          paths:
            - target
      - when:
          condition:
            not: << parameters.skip_msrv >>
          steps:
            - toolkit/select_rust_version:
                rust_version: << pipeline.parameters.min_rust_version >>
            - run:
                name: Write MSRV compiler version for cache key
                command: |
                  rustc "+${RUST_VERSION}" --version > rust-toolchain-version.txt
                  echo "MSRV compiler: $(cat rust-toolchain-version.txt)"
            - restore_cache:
                name: Restore MSRV build cache
                keys:
                  - build-exp-msrv-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-{{ checksum "Cargo.lock" }}
                  - build-exp-msrv-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-
                  - build-exp-msrv-v1-{{ arch }}-
            - run:
                name: Build MSRV
                command: cargo "+${RUST_VERSION}" --target-dir /tmp/target-msrv build --all-features
            - save_cache:
                name: Save MSRV build cache
                key: build-exp-msrv-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-{{ checksum "Cargo.lock" }}
                paths:
                  - /tmp/target-msrv

  # ── EXP #437: idiomatic_rust equivalent ─────────────────────────────────────
  # Changes vs toolkit/idiomatic_rust:
  #   1. Writes rust-toolchain-version.txt (same stable version as exp-required-builds)
  #   2. Seeds build-exp-v1- cache — clippy compiles all crates and produces the
  #      same .rlib incremental artifacts as cargo build, but finishes ~7× faster
  #      than exp-required-builds (50s vs 360s in pipeline #8250).
  #      exp-required-builds declares requires: [exp-idiomatic-rust] so it always
  #      restores from this cache rather than rebuilding from scratch.
  exp-idiomatic-rust:
    executor:
      name: toolkit/rust_env_rolling
    steps:
      - checkout
      - run:
          name: Write compiler version for cache key
          command: rustc --version > rust-toolchain-version.txt
      - restore_cache:
          name: Restore dependency cache
          keys:
            - deps-v1-{{ arch }}-{{ checksum "Cargo.lock" }}
            - deps-v1-{{ arch }}-
      - restore_cache:
          name: Restore shared build cache (exp #437)
          keys:
            - build-exp-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-{{ checksum "Cargo.lock" }}
            - build-exp-v1-{{ arch }}-
      - run:
          name: Check idiomatic code with Clippy
          command: |
            cargo clippy \
              --all \
              --tests \
              --all-features \
              -- -D warnings
      - save_cache:
          name: Save dependency cache
          key: deps-v1-{{ arch }}-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
      - save_cache:
          name: Save shared build cache (exp #437)
          key: build-exp-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-{{ checksum "Cargo.lock" }}
          paths:
            - target

  # ── EXP: msrv_build (new, parallel) ─────────────────────────────────────────
  # Runs the MSRV build in parallel with the idiomatic→required-builds chain
  # when exp-required-builds is invoked with skip_msrv: true.
  #
  # Uses --target-dir /tmp/target-msrv (same as the when: block in
  # exp-required-builds) so the two code paths share the same cache namespace.
  # MSRV changes infrequently; the first prefix fallback (same compiler,
  # different Cargo.lock) hits across consecutive Renovate PRs so only the
  # changed crates need recompiling.
  exp-msrv-build:
    executor:
      name: toolkit/rust_env_rolling
    steps:
      - checkout
      - toolkit/select_rust_version:
          rust_version: << pipeline.parameters.min_rust_version >>
      - run:
          name: Write MSRV compiler version for cache key
          command: |
            rustc "+${RUST_VERSION}" --version > rust-toolchain-version.txt
            echo "MSRV compiler: $(cat rust-toolchain-version.txt)"
      - restore_cache:
          name: Restore dependency cache
          keys:
            - deps-v1-{{ arch }}-{{ checksum "Cargo.lock" }}
            - deps-v1-{{ arch }}-
      - restore_cache:
          name: Restore MSRV build cache
          keys:
            - build-exp-msrv-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-{{ checksum "Cargo.lock" }}
            - build-exp-msrv-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-
            - build-exp-msrv-v1-{{ arch }}-
      - run:
          name: Build MSRV
          command: cargo "+${RUST_VERSION}" --target-dir /tmp/target-msrv build --all-features
      - save_cache:
          name: Save dependency cache
          key: deps-v1-{{ arch }}-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
      - save_cache:
          name: Save MSRV build cache
          key: build-exp-msrv-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-{{ checksum "Cargo.lock" }}
          paths:
            - /tmp/target-msrv

  # ── EXP #437: test_doc_build equivalent ─────────────────────────────────────
  # Changes vs toolkit/test_doc_build:
  #   1. Writes nightly compiler version to rust-toolchain-version.txt so the
  #      build cache key invalidates when nightly ships a new compiler, preventing
  #      silent reuse of stale doc artifacts.
  exp-test-doc-build:
    executor:
      name: toolkit/rust_env_rolling
    environment:
      RUSTDOCFLAGS: --cfg docsrs -Dwarnings
    steps:
      - checkout
      - run:
          name: Write nightly compiler version for cache key
          command: rustc +nightly --version > rust-toolchain-version.txt
      - restore_cache:
          name: Restore dependency cache
          keys:
            - deps-v1-{{ arch }}-{{ checksum "Cargo.lock" }}
            - deps-v1-{{ arch }}-
      - restore_cache:
          name: Restore nightly doc build cache
          keys:
            - build-exp-doc-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-{{ checksum "Cargo.lock" }}
            - build-exp-doc-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-
      - run:
          name: Test doc build (nightly)
          command: |
            cargo +nightly doc \
              --lib \
              --no-deps \
              --all-features \
              --document-private-items
      - save_cache:
          name: Save dependency cache
          key: deps-v1-{{ arch }}-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
      - save_cache:
          name: Save nightly doc build cache
          key: build-exp-doc-v1-{{ arch }}-{{ checksum "rust-toolchain-version.txt" }}-{{ checksum "Cargo.lock" }}
          paths:
            - target

  # ── EXP #438: optional_builds equivalent ────────────────────────────────────
  # Changes vs toolkit/optional_builds:
  #   1. No rustup cache — nightly, beta, and stable are all pre-installed in the
  #      ci-rust container image; caching ~/.rustup adds nothing and risks overlaying
  #      a stale toolchain onto the image's fresh installation.
  #   2. target/ NOT cached — nightly changes daily so incremental artifacts are
  #      immediately stale; cross-PR value is zero (each Renovate PR changes Cargo.lock)
  #   3. Non-blocking: build failures log a warning and exit 0 so validation
  #      continues; the PR is not blocked by a nightly/beta regression
  exp-optional-builds:
    executor:
      name: toolkit/rust_env_rolling
    steps:
      - checkout
      - restore_cache:
          name: Restore dependency cache
          keys:
            - deps-v1-{{ arch }}-{{ checksum "Cargo.lock" }}
            - deps-v1-{{ arch }}-
      - run:
          name: Build nightly (soft failure)
          command: |
            set +e
            cargo +nightly build --all-features
            EXIT_CODE=$?
            set -e
            if [ $EXIT_CODE -ne 0 ]; then
              echo ""
              echo "WARNING: nightly build FAILED (exit: $EXIT_CODE)"
              echo "Logging soft failure — validation workflow continues."
              echo "TODO(#438): raise GitHub issue on the repo under test."
            fi
            exit 0
      - run:
          name: Build beta (soft failure)
          command: |
            set +e
            cargo +beta build --all-features
            EXIT_CODE=$?
            set -e
            if [ $EXIT_CODE -ne 0 ]; then
              echo ""
              echo "WARNING: beta build FAILED (exit: $EXIT_CODE)"
              echo "Logging soft failure — validation workflow continues."
              echo "TODO(#438): raise GitHub issue on the repo under test."
            fi
            exit 0
      - save_cache:
          name: Save dependency cache
          key: deps-v1-{{ arch }}-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
      # target/ and ~/.rustup intentionally NOT saved — see comment above

  test-setup:
    executor:
      name: toolkit/rust_env_rolling
    parameters:
      pcu_verbosity:
        type: string
        default: "-vv"
        description: "The verbosity of the pcu command"
      pcu_semver:
        type: boolean
        default: false
        description: "Whether or not set the semver version flag"
      pcu_commit_message:
        type: string
        default: "chore: test push"
        description: "The commit message to use for the pcu test push"
    steps:
      - checkout
      - toolkit/gpg_key
      - toolkit/git_config
      - run:
          name: Install pcu from project under test
          command: |
            cargo install --force --path ./crates/pcu
      - run:
          name: Copy updated pcu to bin directory
          command: |
            set -exo pipefail

            mkdir -p ~/project/bin
            cp $(which pcu) ~/project/bin/pcu

      - run:
          name: Set test root for bluesky and linkedin testing jobs
          command: |
            echo 'export BSKY_TEST_ROOT="crates/pcu/tests/bsky"' >> bash.env
            echo 'export LINKEDIN_TEST_ROOT="crates/pcu/tests/linkedin"' >> bash.env

      - persist_to_workspace:
          root: .
          paths:
            - bin
            - bash.env

  test-commit:
    executor:
      name: toolkit/rust_env_rolling
    parameters:
      pcu_verbosity:
        type: string
        default: "-vv"
        description: "The verbosity of the pcu command"
      pcu_semver:
        type: boolean
        default: false
        description: "Whether or not set the semver version flag"
      pcu_commit_message:
        type: string
        default: "chore: test push"
        description: "The commit message to use for the pcu test push"
    steps:
      - checkout
      - toolkit/gpg_key
      - toolkit/git_config
      # Start with the test setup workspace
      - attach_workspace:
          at: .
      - run:
          name: Create test file
          command: |
            set -ex
            echo "test" > test.txt
      - run:
          name: Test commit
          command: |
            set -ex

            if [ "<< parameters.pcu_semver >>" == "true"  ] && [ $SEMVER != ""  ]; then
              bin/pcu << parameters.pcu_verbosity >> commit --commit-message "<< parameters.pcu_commit_message >>" --semver $SEMVER
            else
              bin/pcu << parameters.pcu_verbosity >> commit --commit-message "<< parameters.pcu_commit_message >>"
            fi

  test-push:
    executor:
      name: toolkit/rust_env_rolling
    parameters:
      pcu_verbosity:
        type: string
        default: "-vv"
        description: "The verbosity of the pcu command"
      pcu_no_push:
        type: boolean
        default: false
        description: "Whether or not prevent final push of commit"
    steps:
      - checkout
      - toolkit/gpg_key
      - toolkit/git_config
      # Start with the test setup workspace
      - attach_workspace:
          at: .
      - run:
          name: Create test file
          command: |
            set -ex
            echo "test" > test.txt
      - run:
          name: Test push
          command: |
            set -ex
            if [ "<< parameters.pcu_no_push >>" == "true"  ] ; then
              no_push="--no-push"
            else 
              no_push=""
            fi

            bin/pcu << parameters.pcu_verbosity >> push ${no_push}

  test-bsky-directory:
    executor:
      name: toolkit/rust_env_rolling
    parameters:
      pcu_verbosity:
        type: string
        default: "-vv"
        description: "The verbosity of the pcu command"
      pcu_no_push:
        type: boolean
        default: false
        description: "Whether or not prevent final push of commit"
    steps:
      - checkout
      - toolkit/gpg_key
      - toolkit/git_config
      # Start with the test setup workspace
      - attach_workspace:
          at: .

      - run:
          name: Load environment variable
          command: |
            cat bash.env >> $BASH_ENV
      - run:
          name: Use environment variable
          command: echo $BSKY_TEST_ROOT

      - run:
          name: Draft bsky directory
          command: |
            set -ex

            rm -rf $BSKY_TEST_ROOT/bluesky
            mkdir -p $BSKY_TEST_ROOT/bluesky
            ls -la

            bin/pcu << parameters.pcu_verbosity >> bsky draft -d 2025-04-01 -w $BSKY_TEST_ROOT content/blog
            ls -la
            ls -la $BSKY_TEST_ROOT
            ls -la $BSKY_TEST_ROOT/bluesky
            cat $(ls -d $BSKY_TEST_ROOT/bluesky/*)
            ls -la $BSKY_TEST_ROOT/static/s
            cat $(ls -d $BSKY_TEST_ROOT/static/s/*)
            git status

      - run:
          name: Post bsky directory
          command: |
            set -ex

            export TESTING=true
            ls -la $BSKY_TEST_ROOT/bluesky
            bin/pcu << parameters.pcu_verbosity >> bsky post
            ls -la $BSKY_TEST_ROOT/bluesky
            git status

  test-bsky-file:
    executor:
      name: toolkit/rust_env_rolling
    parameters:
      pcu_verbosity:
        type: string
        default: "-vv"
        description: "The verbosity of the pcu command"
      pcu_no_push:
        type: boolean
        default: false
        description: "Whether or not prevent final push of commit"
    steps:
      - checkout
      - toolkit/gpg_key
      - toolkit/git_config
      # Start with the test setup workspace
      - attach_workspace:
          at: .

      - run:
          name: Load environment variable
          command: |
            cat bash.env >> $BASH_ENV
      - run:
          name: Use environment variable
          command: echo $BSKY_TEST_ROOT

      - run:
          name: Test bsky file
          command: |
            set -ex

            rm -rf ${BSKY_TEST_ROOT}/bluesky
            mkdir -p ${BSKY_TEST_ROOT}/bluesky  

            bin/pcu << parameters.pcu_verbosity >> bsky draft -d 2025-04-01 -w ${BSKY_TEST_ROOT} content/blog/bsky-test-blog.md
            ls -la ${BSKY_TEST_ROOT}
            ls -la ${BSKY_TEST_ROOT}/bluesky

      - run:
          name: Display bluesky post contents
          command: |
            set -ex

            ls -la ${BSKY_TEST_ROOT}/bluesky
            cat ${BSKY_TEST_ROOT}/bluesky/$(ls ${BSKY_TEST_ROOT}/bluesky)

      - run:
          name: Display short link contents
          command: |
            set -ex

            ls -la ${BSKY_TEST_ROOT}/static/s
            cat ${BSKY_TEST_ROOT}/static/s/*.html
            cat ${BSKY_TEST_ROOT}/static/s/registry.json

      - run:
          name: Git status after drafting
          command: |
            git status

      - run:
          name: Post bsky file
          command: |
            set -ex

            export TESTING=true
            ls -la ${BSKY_TEST_ROOT}/bluesky
            bin/pcu << parameters.pcu_verbosity >> bsky post
            ls -la ${BSKY_TEST_ROOT}/bluesky
            git status

  test-linkedin-directory:
    executor:
      name: toolkit/rust_env_rolling
    parameters:
      pcu_verbosity:
        type: string
        default: "-vv"
        description: "The verbosity of the pcu command"
    steps:
      - checkout
      - toolkit/gpg_key
      - toolkit/git_config
      - attach_workspace:
          at: .
      - run:
          name: Load environment variables
          command: |
            cat bash.env >> $BASH_ENV
      - run:
          name: Draft linkedin directory
          command: |
            set -ex

            # Reset fixture files to tracked state so idempotency guard doesn't fire
            git checkout -- $LINKEDIN_TEST_ROOT/content/blog/
            rm -rf $LINKEDIN_TEST_ROOT/linkedin
            mkdir -p $LINKEDIN_TEST_ROOT/linkedin

            bin/pcu << parameters.pcu_verbosity >> linkedin draft -d 2025-01-01 -w $LINKEDIN_TEST_ROOT content/blog
            ls -la $LINKEDIN_TEST_ROOT/linkedin
            cat $(ls -d $LINKEDIN_TEST_ROOT/linkedin/*)
            git status

      - run:
          name: Post linkedin directory
          command: |
            set -ex

            export PCU_LINKEDIN_STORE="$LINKEDIN_TEST_ROOT/linkedin"
            export PCU_LINKEDIN_ACCESS_TOKEN="dummy-test-token"
            export PCU_LINKEDIN_AUTHOR_URN="urn:li:organization:123456"
            export TESTING=true

            ls -la $LINKEDIN_TEST_ROOT/linkedin
            bin/pcu << parameters.pcu_verbosity >> linkedin post
            ls -la $LINKEDIN_TEST_ROOT/linkedin
            git status

  test-linkedin-file:
    executor:
      name: toolkit/rust_env_rolling
    parameters:
      pcu_verbosity:
        type: string
        default: "-vv"
        description: "The verbosity of the pcu command"
    steps:
      - checkout
      - toolkit/gpg_key
      - toolkit/git_config
      - attach_workspace:
          at: .
      - run:
          name: Load environment variables
          command: |
            cat bash.env >> $BASH_ENV
      - run:
          name: Draft linkedin file
          command: |
            set -ex

            git checkout -- $LINKEDIN_TEST_ROOT/content/blog/linkedin-test-blog.md
            rm -rf $LINKEDIN_TEST_ROOT/linkedin
            mkdir -p $LINKEDIN_TEST_ROOT/linkedin

            bin/pcu << parameters.pcu_verbosity >> linkedin draft -d 2025-01-01 -w $LINKEDIN_TEST_ROOT content/blog/linkedin-test-blog.md
            ls -la $LINKEDIN_TEST_ROOT/linkedin
            cat $LINKEDIN_TEST_ROOT/linkedin/linkedin-test-blog.linkedin
            git status

      - run:
          name: Post linkedin file
          command: |
            set -ex

            export PCU_LINKEDIN_STORE="$LINKEDIN_TEST_ROOT/linkedin"
            export PCU_LINKEDIN_ACCESS_TOKEN="dummy-test-token"
            export PCU_LINKEDIN_AUTHOR_URN="urn:li:organization:123456"
            export TESTING=true

            ls -la $LINKEDIN_TEST_ROOT/linkedin
            bin/pcu << parameters.pcu_verbosity >> linkedin post
            ls -la $LINKEDIN_TEST_ROOT/linkedin || true
            git status

workflows:
  validation:
    jobs:
      # Signature verification for trusted PRs (with write access for comments)
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_trusted
          context: bot-check
          post_comment: true
          update_pcu: false
          filters:
            branches:
              ignore:
                - main
                - /pull\/[0-9]+/
      # Signature verification for forked PRs (read-only, no comments)
      - toolkit/verify_commit_signatures:
          name: verify_commit_signatures_forked
          post_comment: false
          update_pcu: false
          filters:
            branches:
              only: /pull\/[0-9]+/
      # ── Build / lint / doc jobs — exp variants while toolkit cache changes roll out ──
      # toolkit/required_builds, toolkit/idiomatic_rust, toolkit/test_doc_build, and
      # toolkit/optional_builds are temporarily replaced by the exp- equivalents below.
      # Restore after digital-prstv/circleci-toolkit#437 and #438 ship.
      #
      # exp-required-builds runs `cargo build --all-features` against the full workspace,
      # covering all three crates (gen-bsky, gen-linkedin, pcu) in a single job.
      # The separate per-package matrix jobs (build-gen-bsky, build-gen-linkedin, build-pcu)
      # are not needed — the whole-workspace build provides equivalent coverage.
      - exp-idiomatic-rust:
          filters:
            branches:
              ignore: main
      - exp-required-builds:
          skip_msrv: true
          requires:
            - exp-idiomatic-rust
          filters:
            branches:
              ignore: main
      - exp-msrv-build:
          filters:
            branches:
              ignore: main
      - exp-test-doc-build:
          filters:
            branches:
              ignore: main
      - exp-optional-builds:
          filters:
            branches:
              ignore: main
      - toolkit/common_tests:
          min_rust_version: << pipeline.parameters.min_rust_version >>
          test_runner: nextest
          nextest_profile: ci
      - test-setup:
          context:
            - release
            - bot-check
            - pcu-app
          filters:
            branches:
              ignore: main

      - test-commit:
          pcu_verbosity: "-vvvv"
          context:
            - release
            - bot-check
            - pcu-app
          filters:
            branches:
              ignore: main
          requires:
            - test-setup
            - toolkit/common_tests
            - security with sonarcloud
            - exp-required-builds
            - exp-msrv-build
            - exp-test-doc-build
            - exp-idiomatic-rust
      - test-push:
          pcu_verbosity: "-vvvv"
          pcu_no_push: true
          context:
            - release
            - bot-check
            - pcu-app
          filters:
            branches:
              ignore: main
          requires:
            - test-setup
            - toolkit/common_tests
            - security with sonarcloud
            - exp-required-builds
