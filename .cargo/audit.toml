# cargo audit configuration
#
# Policy: warnings are denied in CI (`-D warnings`). Before ignoring an
# advisory we must:
#   1. Attempt to fix it (cargo update, dependency upgrade, code change).
#   2. Establish why a fix is not currently possible.
#   3. Document the practical risk level and the resolution path.
#
# Advisory IDs listed here MUST also appear in `ignore_advisories` in
# .circleci/config.yml so the CI command and this file stay in sync.

[advisories]
ignore = [
    # RUSTSEC-2023-0071: rsa 0.9.10 — Marvin Attack timing side-channel
    # (CVSS 5.9 Medium). Fix attempted: no patched rsa 0.9.x exists upstream.
    # Transitive: sigstore 0.13.0 → rsa 0.9.10. pcu uses sigstore only for CI
    # attestation signing (not decryption), so the Marvin Attack (requires a
    # decryption oracle) cannot be triggered. Remove when sigstore updates rsa.
    "RUSTSEC-2023-0071",

    # RUSTSEC-2026-0173: proc-macro-error2 2.0.1 — unmaintained (2026-06-07).
    # The proc-macro-error2 repo is ARCHIVED, so it will never be patched.
    # Fix attempted: no fixed upstream exists. Remaining transitive path:
    #   sigstore → oci-client → oci-spec → getset → proc-macro-error2
    #     (getset is the blocker: inactive since 2025-06; jbaublitz/getset#132)
    # (The gen-bsky → aquamarine path was removed: aquamarine replaced with the
    #  zero-dependency simple-mermaid for rustdoc diagrams.)
    # Unmaintained != vulnerable; no known CVE. Upstream tracking:
    # jbaublitz/getset#132, youki-dev/oci-spec-rs#340 (filed by us).
    # TEMPORARY — reviewed weekly; remove when a fixed getset/oci-spec ships.
    "RUSTSEC-2026-0173",

]

# Yanked-package checking re-enabled: core2 0.4.0 was removed from the
# dependency tree by the cargo update on 2026-04-18 (bsky-sdk chain now
# resolves without it).
